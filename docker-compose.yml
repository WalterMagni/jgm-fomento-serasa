services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-serasa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal_serasa}
      POSTGRES_USER: ${POSTGRES_USER:-serasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"   # 5433 no host para não conflitar com outro Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - serasa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serasa} -d ${POSTGRES_DB:-portal_serasa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: portal-serasa-backend
    restart: unless-stopped
    ports:
      - "8081:8080"   # 8081 no host para não conflitar com outra app
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-portal_serasa}
      DB_USER: ${POSTGRES_USER:-serasa}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERASA_API_URL: ${SERASA_API_URL:-https://api.serasaexperian.com.br}
      SERASA_API_USER: ${SERASA_API_USER}
      SERASA_API_PASSWORD: ${SERASA_API_PASSWORD}
      CNPJA_API_KEY: ${CNPJA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      SMTP_HOST: ${SMTP_HOST:-cloud29.mailgrid.net.br}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-jgmempresarial@jgmempresarial.com}
      EMAIL_COMERCIAL: ${EMAIL_COMERCIAL:-comercial@jgmfomento.com}
      EMAIL_CEDENTE_ENABLED: ${EMAIL_CEDENTE_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      APP_USER_MANAGEMENT_ALLOWED_EMAILS: ${APP_USER_MANAGEMENT_ALLOWED_EMAILS:-}
      # Filiais via cópia local da Receita (cnpj-data-pipeline). Postgres SEPARADO,
      # alcançado pela rede external cnpj-net (container cnpj-pipeline-postgres:5432).
      # Defaults já apontam pro container; em prod basta CNPJ_DB_ENABLED=true no .env.
      CNPJ_DB_ENABLED: ${CNPJ_DB_ENABLED:-false}
      CNPJ_DB_URL: ${CNPJ_DB_URL:-jdbc:postgresql://cnpj-pipeline-postgres:5432/cnpj}
      CNPJ_DB_USER: ${CNPJ_DB_USER:-postgres}
      CNPJ_DB_PASSWORD: ${CNPJ_DB_PASSWORD:-postgres}
      CNPJ_BRANCHES_TTL_DAYS: ${CNPJ_BRANCHES_TTL_DAYS:-30}
      CNPJ_BRANCHES_MAX_ROWS: ${CNPJ_BRANCHES_MAX_ROWS:-2000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Pasta base de documentos das empresas.
      # No portal, configure o caminho base como: /mnt/clientes
      # Em produção/WSL, garanta que o compartilhamento esteja montado no host em:
      # /mnt/jgm/FM/Cadastro e Comercial/CLIENTES
      - "${DOCUMENTS_BASE_HOST_PATH:-/mnt/jgm/FM/Cadastro e Comercial/CLIENTES}:/mnt/clientes"
    networks:
      - serasa-net
      - cnpj-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: portal-serasa-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"   # 3001 no host para não conflitar com outra app
    depends_on:
      - backend
    networks:
      - serasa-net

volumes:
  postgres_data:

networks:
  serasa-net:
    name: portal-serasa-net
    driver: bridge
  # Rede do compose do cnpj-data-pipeline (banco da Receita). Já existe no servidor —
  # referenciada como external para o backend alcançar cnpj-pipeline-postgres por nome.
  cnpj-net:
    external: true
    name: cnpj-data-pipeline_default
