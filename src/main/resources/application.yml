spring:
  application:
    name: portal-serasa
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portal_serasa}
    username: ${DB_USER:serasa}
    password: ${DB_PASSWORD:serasa123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

serasa:
  api:
    base-url: ${SERASA_API_URL:https://api.serasa.example.com}

cnpja:
  api:
    authorization: ${CNPJA_API_KEY:}

app:
  client:
    import:
      default-path: ${CLIENT_CSV_PATH:clientes.csv}
