spring:
  application:
    name: portal-serasa
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portal_serasa}
    username: ${DB_USER:serasa}
    password: ${DB_PASSWORD:serasa123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:15MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}
  mail:
    host: ${SMTP_HOST:cloud29.mailgrid.net.br}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:jgmempresarial@jgmempresarial.com}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

serasa:
  api:
    base-url: ${SERASA_API_URL:https://api.serasaexperian.com.br}
    username: ${SERASA_API_USER:}
    password: ${SERASA_API_PASSWORD:}

cnpja:
  api:
    authorization: ${CNPJA_API_KEY:}

app:
  client:
    import:
      default-path: ${CLIENT_CSV_PATH:clientes.csv}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  user-management:
    allowed-emails: ${APP_USER_MANAGEMENT_ALLOWED_EMAILS:}

api:
  security:
    token:
      secret: ${JWT_SECRET:portal-serasa-secret-key-default-dev-only}

billing:
  serasa:
    cost-per-query: ${SERASA_COST_PER_QUERY:6.33}
    pf-cost-per-query: ${SERASA_PF_COST_PER_QUERY:15.52}

gemini:
  api:
    key: ${GEMINI_API_KEY:${GOOGLE_GENERATIVE_AI_API_KEY:}}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

bigquery:
  enabled: ${BIGQUERY_ENABLED:false}
  project-id: ${BIGQUERY_PROJECT_ID:}
  credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
  branches:
    cache-ttl-days: ${BIGQUERY_BRANCHES_TTL_DAYS:30}

email:
  cedente:
    from: ${EMAIL_FROM:jgmempresarial@jgmempresarial.com}
    to: ${EMAIL_COMERCIAL:comercial@jgmfomento.com}
    enabled: ${EMAIL_CEDENTE_ENABLED:true}
